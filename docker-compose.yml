version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: spider_qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: spider_redis
    ports:
      - "6379:6379" # Puerto estándar de Redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local